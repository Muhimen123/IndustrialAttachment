<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Student Details</title>
  <link th:href="@{/css/globals.css}" rel="stylesheet">
  <link th:href="@{/css/students/student_details.css}" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: studentNavbar('none')}"></div>

<div class="page-wrap">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">

        <div class="detail-card">

          <!-- Header -->
          <div class="detail-header">
            <div class="icon-wrap">
              <i class="bi bi-pencil-square"></i>
            </div>
            <h3>Edit Student Profile</h3>
            <p>Update the fields below and save your changes.</p>
          </div>

          <!-- Body -->
          <div class="detail-body">

            <form th:action="@{/students/{id}/update(id=${student.id})}" th:object="${student}" method="POST">

              <!-- Read-only ID -->
              <div class="id-row">
                <span class="id-label">Student ID</span>
                <span class="id-value" th:text="'#' + ${student.id}">#1</span>
              </div>

              <!-- Name Field -->
              <div class="mb-4">
                <label for="name" class="form-label">Full Name</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-person"></i></span>
                  <input type="text"
                         th:field="*{name}"
                         class="form-control"
                         id="name"
                         required />
                </div>
              </div>

              <hr class="field-divider">

              <!-- Email Field -->
              <div class="mb-4">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input type="email"
                         th:field="*{email}"
                         class="form-control"
                         id="email"
                         required />
                </div>
              </div>

              <hr class="action-divider">

              <!-- Action Controls -->
              <div class="d-flex justify-content-between align-items-center">
                <a th:href="@{/students}" class="btn-cancel">
                  <i class="bi bi-arrow-left"></i> Cancel
                </a>
                <div class="d-flex gap-2">
                  <a th:href="@{/students/delete/{id}(id=${student.id})}"
                     class="btn-delete"
                     onclick="return confirm('Are you sure you want to delete this student?');">
                    <i class="bi bi-trash"></i> Delete
                  </a>
                  <button type="submit" class="btn-save">
                    <i class="bi bi-check-lg"></i> Save Changes
                  </button>
                </div>
              </div>

            </form>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
