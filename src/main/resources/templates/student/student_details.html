<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Student Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --forest:  #546B41;
      --sage:    #99AD7A;
      --sand:    #DCCCAC;
      --cream:   #FFF8EC;
      --ink:     #2e3a26;
      --muted:   #7a8c6e;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* ── Geometric background pattern ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
              repeating-linear-gradient(
                      45deg,
                      transparent,
                      transparent 38px,
                      rgba(153,173,122,.13) 38px,
                      rgba(153,173,122,.13) 40px
              ),
              repeating-linear-gradient(
                      -45deg,
                      transparent,
                      transparent 38px,
                      rgba(84,107,65,.07) 38px,
                      rgba(84,107,65,.07) 40px
              );
      pointer-events: none;
      z-index: 0;
    }

    /* ── Accent blobs ── */
    body::after {
      content: '';
      position: fixed;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(153,173,122,.22) 0%, transparent 70%);
      top: -120px;
      right: -120px;
      pointer-events: none;
      z-index: 0;
    }

    .blob-bottom {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220,204,172,.35) 0%, transparent 70%);
      bottom: -100px;
      left: -80px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Navbar override ── */
    .navbar, nav {
      background-color: var(--forest) !important;
      border-bottom: 3px solid var(--sage);
    }
    .navbar-brand, .nav-link { color: var(--cream) !important; }
    .nav-link:hover { color: var(--sand) !important; }

    /* ── Layout ── */
    .page-wrap {
      position: relative;
      z-index: 1;
      padding: 3rem 1rem 4rem;
    }

    /* ── Card ── */
    .detail-card {
      background: var(--cream);
      border: 2px solid var(--sand);
      border-radius: 0;
      overflow: hidden;
      max-width: 540px;
      margin: 0 auto;
    }

    /* ── Card header ── */
    .detail-header {
      background-color: var(--forest);
      padding: 2rem 2rem 1.6rem;
      position: relative;
    }

    .detail-header .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--sage);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: .9rem;
    }

    .detail-header .icon-wrap i {
      font-size: 1.3rem;
      color: var(--cream);
    }

    .detail-header h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--cream);
      margin: 0;
      letter-spacing: -.02em;
    }

    .detail-header p {
      color: var(--sand);
      margin: .25rem 0 0;
      font-size: .88rem;
      font-weight: 300;
    }

    /* corner decoration */
    .detail-header::after {
      content: '';
      position: absolute;
      bottom: -18px; right: 28px;
      width: 36px; height: 36px;
      background: var(--sage);
      transform: rotate(45deg);
    }

    /* ── Card body ── */
    .detail-body {
      padding: 2.5rem 2.5rem 2rem;
    }

    /* ── ID read-only block ── */
    .id-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--sand);
      padding: .75rem 1rem;
      margin-bottom: 1.6rem;
    }

    .id-row .id-label {
      font-size: .75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      white-space: nowrap;
    }

    .id-row .id-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--forest);
      font-weight: 700;
      line-height: 1;
    }

    /* ── Form labels ── */
    .form-label {
      font-weight: 500;
      font-size: .82rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--forest);
      margin-bottom: .45rem;
    }

    /* ── Inputs ── */
    .form-control {
      background: #fff;
      border: 2px solid var(--sand);
      border-radius: 0;
      padding: .7rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--ink);
      transition: border-color .2s, background .2s;
    }

    .form-control::placeholder { color: #b8af9e; }

    .form-control:focus {
      border-color: var(--forest);
      background: var(--cream);
      box-shadow: none;
      outline: none;
    }

    /* input icon wrapper */
    .input-group-text {
      background: var(--sand);
      border: 2px solid var(--sand);
      border-right: none;
      border-radius: 0;
      color: var(--forest);
    }

    .input-group .form-control {
      border-left: none;
    }

    .input-group .form-control:focus {
      border-left: none;
    }

    /* ── Field divider ── */
    .field-divider {
      border: none;
      border-top: 1px dashed var(--sand);
      margin: 1.4rem 0;
    }

    /* ── Action divider ── */
    .action-divider {
      border: none;
      border-top: 2px solid var(--sand);
      margin: 1.8rem 0 1.4rem;
    }

    /* ── Buttons ── */
    .btn-save {
      background-color: var(--forest);
      color: var(--cream);
      border: 2px solid var(--forest);
      border-radius: 0;
      padding: .65rem 1.4rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: .88rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      transition: background .2s, color .2s, transform .1s;
      cursor: pointer;
    }

    .btn-save:hover {
      background-color: var(--sage);
      border-color: var(--sage);
      color: var(--ink);
      transform: translateY(-1px);
    }

    .btn-save:active { transform: translateY(0); }

    .btn-cancel {
      background: transparent;
      color: var(--muted);
      border: 2px solid var(--sand);
      border-radius: 0;
      padding: .65rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: .88rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      transition: border-color .2s, color .2s;
    }

    .btn-cancel:hover {
      border-color: var(--muted);
      color: var(--ink);
    }

    .btn-delete {
      background: transparent;
      color: #b85c4a;
      border: 2px solid #b85c4a;
      border-radius: 0;
      padding: .65rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: .88rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      transition: background .2s, color .2s;
    }

    .btn-delete:hover {
      background: #b85c4a;
      color: #fff;
    }
  </style>
</head>

<body>
<div class="blob-bottom"></div>

<div th:replace="~{fragments/navbar :: studentNavbar('none')}"></div>

<div class="page-wrap">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">

        <div class="detail-card">

          <!-- Header -->
          <div class="detail-header">
            <div class="icon-wrap">
              <i class="bi bi-pencil-square"></i>
            </div>
            <h3>Edit Student Profile</h3>
            <p>Update the fields below and save your changes.</p>
          </div>

          <!-- Body -->
          <div class="detail-body">

            <form th:action="@{/students/{id}/update(id=${student.id})}" th:object="${student}" method="POST">

              <!-- Read-only ID -->
              <div class="id-row">
                <span class="id-label">Student ID</span>
                <span class="id-value" th:text="'#' + ${student.id}">#1</span>
              </div>

              <!-- Name Field -->
              <div class="mb-4">
                <label for="name" class="form-label">Full Name</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-person"></i></span>
                  <input type="text"
                         th:field="*{name}"
                         class="form-control"
                         id="name"
                         required />
                </div>
              </div>

              <hr class="field-divider">

              <!-- Email Field -->
              <div class="mb-4">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input type="email"
                         th:field="*{email}"
                         class="form-control"
                         id="email"
                         required />
                </div>
              </div>

              <hr class="action-divider">

              <!-- Action Controls -->
              <div class="d-flex justify-content-between align-items-center">
                <a th:href="@{/students}" class="btn-cancel">
                  <i class="bi bi-arrow-left"></i> Cancel
                </a>
                <div class="d-flex gap-2">
                  <a th:href="@{/students/delete/{id}(id=${student.id})}"
                     class="btn-delete"
                     onclick="return confirm('Are you sure you want to delete this student?');">
                    <i class="bi bi-trash"></i> Delete
                  </a>
                  <button type="submit" class="btn-save">
                    <i class="bi bi-check-lg"></i> Save Changes
                  </button>
                </div>
              </div>

            </form>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
