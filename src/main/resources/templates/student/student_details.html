<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Student Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow">
        <div class="card-header bg-info text-white text-center">
          <h3 class="mb-0">Edit Student Profile</h3>
        </div>
        <div class="card-body p-4">

          <!-- Form actions point to our new update endpoint -->
          <form th:action="@{/students/{id}/update(id=${student.id})}" th:object="${student}" method="POST">

            <!-- Read-only Database ID Field -->
            <div class="mb-3 row">
              <label class="col-sm-3 col-form-label fw-bold text-muted">Student ID</label>
              <div class="col-sm-9">
                <input type="text" readonly class="form-control-plaintext fw-bold text-secondary fs-5" th:value="${student.id}">
              </div>
            </div>

            <!-- Editable Name Field -->
            <div class="mb-3">
              <label for="name" class="form-label fw-bold text-muted">Full Name</label>
              <input type="text"
                     th:field="*{name}"
                     class="form-control"
                     id="name"
                     required />
            </div>

            <!-- Editable Email Field -->
            <div class="mb-3">
              <label for="email" class="form-label fw-bold text-muted">Email Address</label>
              <input type="email"
                     th:field="*{email}"
                     class="form-control"
                     id="email"
                     required />
            </div>

            <hr class="my-4">

            <!-- Action Controls -->
            <div class="d-flex justify-content-between align-items-center">
              <a th:href="@{/students}" class="btn btn-secondary">Cancel</a>

              <div>
                <a th:href="@{/students/delete/{id}(id=${student.id})}"
                   class="btn btn-outline-danger me-2"
                   onclick="return confirm('Are you sure you want to delete this student?');">
                  Delete
                </a>
                <button type="submit" class="btn btn-success">Save Changes</button>
              </div>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
