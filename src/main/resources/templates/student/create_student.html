<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Student Management System</title>
  <link th:href="@{/css/globals.css}" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    .navbar, nav {
      background-color: var(--forest) !important;
      border-bottom: 3px solid var(--sage);
    }

    /* ── Layout ── */
    .page-wrap {
      position: relative;
      z-index: 1;
      padding: 3rem 1rem 4rem;
    }

    /* ── Card ── */
    .reg-card {
      background: var(--cream);
      border: 2px solid var(--sand);
      border-radius: 0;                   /* flat, geometric */
      overflow: hidden;
      max-width: 520px;
      margin: 0 auto;
      position: relative;
    }


    /* ── Card header ── */
    .reg-header {
      background-color: var(--forest);
      padding: 2rem 2rem 1.6rem 2.5rem;
      position: relative;
    }

    .reg-header .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--sage);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: .9rem;
    }

    .reg-header .icon-wrap i {
      font-size: 1.3rem;
      color: var(--cream);
    }

    .reg-header h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--cream);
      margin: 0;
      letter-spacing: -.02em;
    }

    .reg-header p {
      color: var(--sand);
      margin: .25rem 0 0;
      font-size: .88rem;
      font-weight: 300;
    }

    /* corner decoration */
    .reg-header::after {
      content: '';
      position: absolute;
      bottom: -18px; right: 28px;
      width: 36px; height: 36px;
      background: var(--sage);
      transform: rotate(45deg);
    }

    /* ── Card body ── */
    .reg-body {
      padding: 2.5rem 2.5rem 2rem;
    }

    /* ── Alert ── */
    .alert-success {
      background-color: var(--sage);
      border: none;
      color: var(--ink);
      border-radius: 0;
      border-left: 4px solid var(--forest);
      font-size: .9rem;
    }

    /* ── Form labels ── */
    .form-label {
      font-weight: 500;
      font-size: .82rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--forest);
      margin-bottom: .45rem;
    }

    /* ── Inputs ── */
    .form-control {
      background: #fff;
      border: 2px solid var(--sand);
      border-radius: 0;
      padding: .7rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--ink);
      transition: border-color .2s, background .2s;
    }

    .form-control::placeholder { color: #b8af9e; }

    .form-control:focus {
      border-color: var(--forest);
      background: var(--cream);
      box-shadow: none;
      outline: none;
    }

    /* input icon wrapper */
    .input-group-text {
      background: var(--sand);
      border: 2px solid var(--sand);
      border-right: none;
      border-radius: 0;
      color: var(--forest);
    }

    .input-group .form-control {
      border-left: none;
    }

    .input-group .form-control:focus {
      border-left: none;
    }

    /* ── Submit button ── */
    .btn-submit {
      background-color: var(--forest);
      color: var(--cream);
      border: 2px solid var(--forest);
      border-radius: 0;
      padding: .8rem 1.5rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: .95rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      width: 100%;
      transition: background .2s, color .2s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }

    .btn-submit:hover {
      background-color: var(--sage);
      border-color: var(--sage);
      color: var(--ink);
      transform: translateY(-2px);
    }

    .btn-submit:active { transform: translateY(0); }

    /* ── Footer note ── */
    .form-footer {
      text-align: center;
      font-size: .8rem;
      color: var(--muted);
      margin-top: 1.4rem;
      padding-top: 1rem;
      border-top: 1px solid var(--sand);
    }

    /* ── Field divider ── */
    .field-divider {
      border: none;
      border-top: 1px dashed var(--sand);
      margin: 1.4rem 0;
    }


  </style>
</head>

<body>
<div th:replace="~{fragments/navbar :: studentNavbar(${activePage})}"></div>

<div class="page-wrap">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">

        <!-- Success Alert -->
        <div th:if="${param.success}"
             class="alert alert-success alert-dismissible fade show mb-4"
             role="alert">
          <i class="bi bi-check-circle-fill me-2"></i>
          Student registered successfully!
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="reg-card">

          <!-- Header -->
          <div class="reg-header">
            <div class="icon-wrap">
              <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h3>Register New Student</h3>
            <p>Fill in the details below to add a new student record.</p>
          </div>

          <!-- Body -->
          <div class="reg-body">
            <form th:action="@{/students}" th:object="${student}" method="POST">

              <!-- Name Field -->
              <div class="mb-4">
                <label for="name" class="form-label">Full Name</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-person"></i></span>
                  <input type="text"
                         th:field="*{name}"
                         class="form-control"
                         id="name"
                         placeholder="e.g. Ayaan Khan"
                         required />
                </div>
              </div>

              <hr class="field-divider">

              <!-- Email Field -->
              <div class="mb-4">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input type="email"
                         th:field="*{email}"
                         class="form-control"
                         id="email"
                         placeholder="e.g. ayaan@university.edu"
                         required />
                </div>
              </div>

              <!-- Submit -->
              <div class="mt-4">
                <button type="submit" class="btn-submit">
                  <i class="bi bi-send"></i>
                  Submit Student Data
                </button>
              </div>

              <p class="form-footer">
                <i class="bi bi-shield-check me-1"></i>
                Data is stored securely in your local database.
              </p>

            </form>
          </div>


        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
