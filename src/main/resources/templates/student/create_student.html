<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Student Management System</title>
  <link th:href="@{/css/globals.css}" rel="stylesheet">
  <link th:href="@{/css/create_student.css}" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: studentNavbar(${activePage})}"></div>

<div class="page-wrap">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">

        <!-- Success Alert -->
        <div th:if="${param.success}"
             class="alert alert-success alert-dismissible fade show mb-4"
             role="alert">
          <i class="bi bi-check-circle-fill me-2"></i>
          Student registered successfully!
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="reg-card">

          <!-- Header -->
          <div class="reg-header">
            <div class="icon-wrap">
              <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h3>Register New Student</h3>
            <p>Fill in the details below to add a new student record.</p>
          </div>

          <!-- Body -->
          <div class="reg-body">
            <form th:action="@{/students}" th:object="${student}" method="POST">

              <!-- Name Field -->
              <div class="mb-4">
                <label for="name" class="form-label">Full Name</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-person"></i></span>
                  <input type="text"
                         th:field="*{name}"
                         class="form-control"
                         id="name"
                         placeholder="e.g. Ayaan Khan"
                         required />
                </div>
              </div>

              <hr class="field-divider">

              <!-- Email Field -->
              <div class="mb-4">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input type="email"
                         th:field="*{email}"
                         class="form-control"
                         id="email"
                         placeholder="e.g. ayaan@university.edu"
                         required />
                </div>
              </div>

              <!-- Submit -->
              <div class="mt-4">
                <button type="submit" class="btn-submit">
                  <i class="bi bi-send"></i>
                  Submit Student Data
                </button>
              </div>

              <p class="form-footer">
                <i class="bi bi-shield-check me-1"></i>
                Data is stored securely in your local database.
              </p>

            </form>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
