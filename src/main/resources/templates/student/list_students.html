<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student List</title>
    <link th:href="@{/css/globals.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=600;700&family=DM+Sans:wght=300;400;500&display=swap" rel="stylesheet">

    <style>
        .navbar, nav {
            background-color: var(--forest) !important;
            border-bottom: 3px solid var(--sage);
        }

        .page-wrap {
            position: relative;
            z-index: 1;
            padding: 3rem 1rem 4rem;
        }

        .list-card {
            background: var(--cream);
            border: 2px solid var(--sand);
            border-radius: 0;
            overflow: hidden;
            position: relative;
        }

        .list-header {
            background-color: var(--forest);
            padding: 1.6rem 2rem 1.4rem 2rem;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .list-header-left {
            display: flex;
            align-items: center;
            gap: .9rem;
        }

        .list-header .icon-wrap {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--sage);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .list-header .icon-wrap i {
            font-size: 1.2rem;
            color: var(--cream);
        }

        .list-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--cream);
            margin: 0;
            letter-spacing: -.02em;
        }

        .list-header p {
            color: var(--sand);
            margin: .1rem 0 0;
            font-size: .83rem;
            font-weight: 300;
        }

        .list-header::after {
            content: '';
            position: absolute;
            bottom: -18px; right: 28px;
            width: 36px; height: 36px;
            background: var(--sage);
            transform: rotate(45deg);
            z-index: 0;
        }

        /* Controls Area Container */
        .header-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Styling size selection dropdown */
        .select-size {
            background-color: transparent;
            color: var(--cream);
            border: 1px solid var(--sage);
            border-radius: 0;
            padding: 0.45rem 2rem 0.45rem 0.75rem;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .select-size option {
            background-color: var(--ink);
            color: var(--cream);
        }

        .btn-add {
            background-color: var(--sage);
            color: var(--ink);
            border: 2px solid var(--sage);
            border-radius: 0;
            padding: .5rem 1.1rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: .82rem;
            letter-spacing: .05em;
            text-transform: uppercase;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: .4rem;
            white-space: nowrap;
            transition: background .2s, color .2s, transform .1s;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .btn-add:hover {
            background-color: var(--cream);
            border-color: var(--cream);
            color: var(--forest);
            transform: translateY(-1px);
        }

        .list-body {
            padding: 2rem 2rem 1.5rem;
        }

        .student-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .92rem;
        }

        .student-table thead tr {
            background-color: var(--sand);
            border-bottom: 2px solid var(--forest);
        }

        .student-table thead th {
            font-weight: 500;
            font-size: .78rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--forest);
            padding: .8rem 1rem;
            border: none;
        }

        .student-table tbody tr {
            border-bottom: 1px solid var(--sand);
            transition: background .15s;
            cursor: pointer;
        }

        .student-table tbody tr:last-child {
            border-bottom: none;
        }

        .student-table tbody tr:hover {
            background-color: rgba(153,173,122,.12);
        }

        .student-table tbody td {
            padding: .85rem 1rem;
            color: var(--ink);
            border: none;
            vertical-align: middle;
        }

        .id-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--sand);
            color: var(--forest);
            font-weight: 600;
            font-size: .8rem;
            min-width: 32px;
            height: 28px;
            padding: 0 .5rem;
            letter-spacing: .04em;
        }

        .student-name {
            font-weight: 500;
            color: var(--ink);
        }

        .student-email {
            color: var(--muted);
            font-size: .88rem;
        }

        .btn-details {
            background: transparent;
            border: 1px solid var(--forest);
            color: var(--forest);
            border-radius: 0;
            padding: .3rem .75rem;
            font-size: .78rem;
            font-weight: 500;
            letter-spacing: .04em;
            text-transform: uppercase;
            text-decoration: none;
            transition: background .15s, color .15s;
            display: inline-flex;
            align-items: center;
            gap: .3rem;
        }

        .btn-details:hover {
            background: var(--forest);
            color: var(--cream);
        }

        .btn-del {
            background: transparent;
            border: 1px solid #b85c4a;
            color: #b85c4a;
            border-radius: 0;
            padding: .3rem .75rem;
            font-size: .78rem;
            font-weight: 500;
            letter-spacing: .04em;
            text-transform: uppercase;
            text-decoration: none;
            transition: background .15s, color .15s;
            display: inline-flex;
            align-items: center;
            gap: .3rem;
        }

        .btn-del:hover {
            background: #b85c4a;
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 3.5rem 1rem;
            color: var(--muted);
        }

        .empty-state i {
            font-size: 2.5rem;
            color: var(--sand);
            display: block;
            margin-bottom: .8rem;
        }

        /* Custom Pagination Design Blocks */
        .pagination-container {
            display: flex;
            justify-content: flex-end;
            padding: 0 2rem 1.5rem;
        }
        .pagination-custom .page-item .page-link {
            color: var(--forest);
            background-color: var(--cream);
            border: 1px solid var(--sand);
            border-radius: 0 !important;
            padding: 0.45rem 0.85rem;
            font-size: 0.85rem;
        }
        .pagination-custom .page-item.active .page-link {
            background-color: var(--forest);
            border-color: var(--forest);
            color: var(--cream);
        }
        .pagination-custom .page-item.disabled .page-link {
            background-color: var(--cream);
            color: var(--sand);
        }
        .pagination-custom .page-link:hover:not(.active) {
            background-color: var(--sand);
            color: var(--ink);
        }

        .list-footer {
            padding: .8rem 2rem;
            background: var(--sand);
            font-size: .78rem;
            color: var(--muted);
            font-weight: 500;
            letter-spacing: .04em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: .4rem;
        }
    </style>
</head>

<body>
<div th:replace="~{fragments/navbar :: studentNavbar(${activePage})}"></div>

<div class="page-wrap">
    <div class="container">

        <div class="list-card">

            <!-- Header Grid Configuration -->
            <div class="list-header">
                <div class="list-header-left">
                    <div class="icon-wrap">
                        <i class="bi bi-people-fill"></i>
                    </div>
                    <div>
                        <h3>Registered Students</h3>
                        <p>Click any row to view full details.</p>
                    </div>
                </div>

                <!-- Dynamic Header Layout Options Section -->
                <div class="header-controls">
                    <!-- Dropdown Select Component for controlling entries sizing limits -->
                    <select class="form-select select-size" id="pageSizeSelect" onchange="changePageSize(this.value)">
                        <option value="10" th:selected="${pageSize == 10}">10 Entries</option>
                        <option value="25" th:selected="${pageSize == 25}">25 Entries</option>
                        <option value="50" th:selected="${pageSize == 50}">50 Entries</option>
                        <option value="100" th:selected="${pageSize == 100}">100 Entries</option>
                    </select>

                    <a th:href="@{/students/new}" class="btn-add">
                        <i class="bi bi-plus-lg"></i> Add Student
                    </a>
                </div>
            </div>

            <!-- Table Block element -->
            <div class="list-body">
                <div class="table-responsive">
                    <table class="student-table">
                        <thead>
                        <tr>
                            <th style="width: 8%;">ID</th>
                            <th style="width: 35%;">Full Name</th>
                            <th style="width: 35%;">Email Address</th>
                            <th style="width: 22%;" class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="student : ${students}"
                            class="clickable-row"
                            th:data-href="@{/students/{id}(id=${student.id})}">

                            <td><span class="id-badge" th:text="${student.id}">1</span></td>
                            <td><span class="student-name" th:text="${student.name}">Student Name</span></td>
                            <td><span class="student-email" th:text="${student.email}">student@email.com</span></td>
                            <td class="text-center action-buttons">
                                <div class="d-flex justify-content-center gap-2">
                                    <a th:href="@{/students/{id}(id=${student.id})}" class="btn-details">
                                        <i class="bi bi-eye"></i> Details
                                    </a>
                                    <a th:href="@{/students/delete/{id}(id=${student.id})}"
                                       class="btn-del"
                                       onclick="return confirm('Are you sure you want to delete this student?');">
                                        <i class="bi bi-trash"></i> Delete
                                    </a>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(students)}">
                            <td colspan="4">
                                <div class="empty-state">
                                    <i class="bi bi-inbox"></i>
                                    <p>No students found in the database.</p>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Dynamic Interactive Pagination Control Block Navigation -->
            <div class="pagination-container" th:if="${totalPages > 1}">
                <nav aria-label="Page navigation">
                    <ul class="pagination pagination-custom mb-0">
                        <!-- Left Navigation Arrow Button indicator -->
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/students(page=${currentPage - 1}, size=${pageSize})}" aria-label="Previous">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>

                        <!-- Numeric dynamic buttons loop generation list context -->
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${currentPage == i} ? 'active' : ''">
                            <a class="page-link" th:href="@{/students(page=${i}, size=${pageSize})}" th:text="${i + 1}">1</a>
                        </li>

                        <!-- Right Navigation Arrow Button indicator -->
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/students(page=${currentPage + 1}, size=${pageSize})}" aria-label="Next">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>

            <!-- Footer count -->
            <div class="list-footer">
                <i class="bi bi-person-lines-fill"></i>
                <span th:text="${totalItems} + ' student(s) enrolled'">0 student(s) enrolled</span>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".clickable-row").forEach(row => {
            row.addEventListener("click", (e) => {
                if (!e.target.closest('.action-buttons')) {
                    window.location.href = row.dataset.href;
                }
            });
        });
    });

    // Handle Dropdown sizing adjustments via reloading routes URL parameters context
    function changePageSize(size) {
        window.location.href = '/students?page=0&size=' + size;
    }
</script>
</body>
</html>
