<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Highlight the row on hover and indicate it is clickable */
        .clickable-row {
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Registered Students</h3>
            <a th:href="@{/students/new}" class="btn btn-primary btn-sm">Add New Student</a>
        </div>
        <div class="card-body p-4">

            <div class="table-responsive">
                <table class="table table-striped table-hover table-bordered align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th scope="col" style="width: 10%;">ID</th>
                        <th scope="col" style="width: 40%;">Full Name</th>
                        <th scope="col" style="width: 30%;">Email Address</th>
                        <th scope="col" style="width: 20%;" class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- Added 'clickable-row' class and 'data-href' attribute for JavaScript row clicking -->
                    <tr th:each="student : ${students}"
                        class="clickable-row"
                        th:data-href="@{/students/{id}(id=${student.id})}">

                        <td th:text="${student.id}" class="fw-bold text-secondary">1</td>
                        <td th:text="${student.name}">Student Name</td>
                        <td th:text="${student.email}">student@email.com</td>

                        <!-- Context Options Column -->
                        <td class="text-center action-buttons">
                            <a th:href="@{/students/{id}(id=${student.id})}" class="btn btn-info btn-sm me-1">Details</a>
                            <a th:href="@{/students/delete/{id}(id=${student.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Are you sure you want to delete this student?');">Delete</a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="4" class="text-center text-muted py-4">
                            No students found in the database.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // JavaScript to make the table row clickable, excluding the action buttons
    document.addEventListener("DOMContentLoaded", () => {
        const rows = document.querySelectorAll(".clickable-row");
        rows.forEach(row => {
            row.addEventListener("click", (e) => {
                // Ensure clicking the action buttons or links doesn't trigger the row click redirect
                if (!e.target.closest('.action-buttons')) {
                    window.location.href = row.dataset.href;
                }
            });
        });
    });
</script>
</body>
</html>
