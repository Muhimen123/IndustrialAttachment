<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student List</title>
    <link th:href="@{/css/globals.css}" rel="stylesheet">
    <link th:href="@{/css/list_students.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: studentNavbar(${activePage})}"></div>

<div class="page-wrap">
    <div class="container">

        <div class="list-card">

            <!-- Header -->
            <div class="list-header">
                <div class="list-header-left">
                    <div class="icon-wrap">
                        <i class="bi bi-people-fill"></i>
                    </div>
                    <div>
                        <h3>Registered Students</h3>
                        <p>Click any row to view full details.</p>
                    </div>
                </div>

                <!-- Controls -->
                <div class="header-controls">
                    <select class="form-select select-size" id="pageSizeSelect" onchange="changePageSize(this.value)">
                        <option value="10"  th:selected="${pageSize == 10}">10 Entries</option>
                        <option value="25"  th:selected="${pageSize == 25}">25 Entries</option>
                        <option value="50"  th:selected="${pageSize == 50}">50 Entries</option>
                        <option value="100" th:selected="${pageSize == 100}">100 Entries</option>
                    </select>

                    <a th:href="@{/students/new}" class="btn-add">
                        <i class="bi bi-plus-lg"></i> Add Student
                    </a>
                </div>
            </div>

            <!-- Table -->
            <div class="list-body">
                <div class="table-responsive">
                    <table class="student-table">
                        <thead>
                        <tr>
                            <th style="width: 8%;">ID</th>
                            <th style="width: 35%;">Full Name</th>
                            <th style="width: 35%;">Email Address</th>
                            <th style="width: 22%;" class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="student : ${students}"
                            class="clickable-row"
                            th:data-href="@{/students/{id}(id=${student.id})}">

                            <td><span class="id-badge" th:text="${student.id}">1</span></td>
                            <td><span class="student-name" th:text="${student.name}">Student Name</span></td>
                            <td><span class="student-email" th:text="${student.email}">student@email.com</span></td>
                            <td class="text-center action-buttons">
                                <div class="d-flex justify-content-center gap-2">
                                    <a th:href="@{/students/{id}(id=${student.id})}" class="btn-details">
                                        <i class="bi bi-eye"></i> Details
                                    </a>
                                    <a th:href="@{/students/delete/{id}(id=${student.id})}"
                                       class="btn-del"
                                       onclick="return confirm('Are you sure you want to delete this student?');">
                                        <i class="bi bi-trash"></i> Delete
                                    </a>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(students)}">
                            <td colspan="4">
                                <div class="empty-state">
                                    <i class="bi bi-inbox"></i>
                                    <p>No students found in the database.</p>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination-container" th:if="${totalPages > 1}">
                <nav aria-label="Page navigation">
                    <ul class="pagination pagination-custom mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/students(page=${currentPage - 1}, size=${pageSize})}" aria-label="Previous">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>

                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:classappend="${currentPage == i} ? 'active' : ''">
                            <a class="page-link"
                               th:href="@{/students(page=${i}, size=${pageSize})}"
                               th:text="${i + 1}">1</a>
                        </li>

                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/students(page=${currentPage + 1}, size=${pageSize})}" aria-label="Next">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>

            <!-- Footer count -->
            <div class="list-footer">
                <i class="bi bi-person-lines-fill"></i>
                <span th:text="${totalItems} + ' student(s) enrolled'">0 student(s) enrolled</span>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".clickable-row").forEach(row => {
            row.addEventListener("click", (e) => {
                if (!e.target.closest('.action-buttons')) {
                    window.location.href = row.dataset.href;
                }
            });
        });
    });

    function changePageSize(size) {
        window.location.href = '/students?page=0&size=' + size;
    }
</script>
</body>
</html>
